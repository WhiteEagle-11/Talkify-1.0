<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp — Real-Time Messaging</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Join Screen ─────────────────────────────────────────────────────────── -->
  <div id="joinScreen" class="join-screen">
    <div class="join-card">
      <div class="join-logo">
        <span class="logo-icon">⬡</span>
        <h1>ChatApp</h1>
      </div>
      <p class="join-subtitle">Real-time messaging powered by Java WebSockets</p>

      <div class="join-form">
        <label for="usernameInput">Your display name</label>
        <input
          type="text"
          id="usernameInput"
          placeholder="e.g. Alice, Bob123..."
          maxlength="30"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="joinError" class="join-error hidden"></div>
        <button id="joinBtn" class="btn-primary">
          <span>Enter Chat</span>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <div class="tech-badges">
        <span class="badge">Java 11</span>
        <span class="badge">WebSocket</span>
        <span class="badge">Maven</span>
        <span class="badge">OOP</span>
      </div>
    </div>
  </div>

  <!-- ── Chat UI ──────────────────────────────────────────────────────────────── -->
  <div id="chatUI" class="chat-layout hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-small">
          <span class="logo-icon-sm">⬡</span>
          <span class="logo-text">ChatApp</span>
        </div>
        <div class="connection-dot" id="connectionDot" title="Connected"></div>
      </div>

      <div class="room-label">
        <span class="room-hash">#</span>
        <span>general</span>
      </div>

      <div class="sidebar-section-title">Online — <span id="userCount">0</span></div>
      <div id="userList" class="user-list"></div>

      <div class="sidebar-footer">
        <div class="my-profile" id="myProfile">
          <div class="avatar" id="myAvatar">?</div>
          <div class="profile-info">
            <span class="profile-name" id="myName">—</span>
            <span class="profile-status">● Online</span>
          </div>
          <button class="leave-btn" id="leaveBtn" title="Leave chat">✕</button>
        </div>
      </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-main">
      <header class="chat-header">
        <div class="header-left">
          <span class="header-hash">#</span>
          <span class="header-room">general</span>
          <span class="header-desc">The main channel · Java WebSocket Demo</span>
        </div>
        <div class="header-right">
          <span class="header-users-count" id="headerUserCount">
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            <span id="headerCount">0</span>
          </span>
        </div>
      </header>

      <!-- Messages -->
      <div class="messages-wrapper">
        <div id="messages" class="messages"></div>
        <div id="typingIndicator" class="typing-indicator hidden">
          <span id="typingText">Someone is typing</span>
          <span class="typing-dots"><span></span><span></span><span></span></span>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-wrapper">
          <button class="emoji-btn" id="emojiBtn" title="Reactions">😊</button>
          <textarea
            id="messageInput"
            placeholder="Message #general..."
            rows="1"
            maxlength="500"
          ></textarea>
          <div class="char-count" id="charCount">500</div>
          <button class="send-btn" id="sendBtn" title="Send message">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="emoji-picker hidden" id="emojiPicker">
          <span>👍</span><span>❤️</span><span>😂</span><span>🔥</span>
          <span>🎉</span><span>👏</span><span>🚀</span><span>💡</span>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
